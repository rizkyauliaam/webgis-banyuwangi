<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGIS Fasilitas Pendidikan – Kabupaten Banyuwangi</title>
    <meta name="description" content="Peta sebaran fasilitas pendidikan di Kabupaten Banyuwangi" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --green-dark: #1a6b3c;
            --green-main: #27ae60;
            --green-light: #d4edda;
            --white: #ffffff;
            --bg: #f0f4f1;
            --text: #1e2d27;
            --text-muted: #6c7c72;
            --sidebar-w: 300px;
            --header-h: 62px;
            --shadow: 0 4px 20px rgba(0, 0, 0, .12);
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        /* ── HEADER ── */
        header {
            height: var(--header-h);
            background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-main) 100%);
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .25);
            z-index: 1000;
            flex-shrink: 0;
        }

        .logo {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, .18);
            border-radius: 9px;
            display: grid;
            place-items: center;
            font-size: 20px;
            flex-shrink: 0
        }

        header h1 {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            line-height: 1.25
        }

        header h1 span {
            font-weight: 400;
            font-size: 11px;
            opacity: .85;
            display: block;
            margin-top: 2px
        }

        .badge {
            margin-left: auto;
            background: rgba(255, 255, 255, .18);
            color: #fff;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            backdrop-filter: blur(6px)
        }

        /* ── LAYOUT ── */
        .app {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        /* ── SIDEBAR ── */
        aside {
            width: var(--sidebar-w);
            background: var(--white);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 16px rgba(0, 0, 0, .08);
            z-index: 900;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid #e8f0eb
        }

        .sidebar-section:last-child {
            border-bottom: none
        }

        .section-title {
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: var(--green-dark);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--green-main);
            border-radius: 2px
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px
        }

        .stat-card {
            border-radius: 10px;
            padding: 12px 10px;
            text-align: center;
            transition: transform .15s;
            cursor: default
        }

        .stat-card:hover {
            transform: translateY(-2px)
        }

        .stat-card .count {
            font-size: 22px;
            font-weight: 700;
            line-height: 1
        }

        .stat-card .label {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 500
        }

        .stat-card.sd {
            background: #e3f0ff;
            color: #1565c0
        }

        .stat-card.smp {
            background: #e8f5e9;
            color: #2e7d32
        }

        .stat-card.sma {
            background: #fde8e8;
            color: #c62828
        }

        .stat-card.tk {
            background: #fff8e1;
            color: #f57f17
        }

        .stat-card.lain {
            background: #f3f0ff;
            color: #4527a0
        }

        .stat-card.total {
            background: linear-gradient(135deg, var(--green-dark), var(--green-main));
            color: #fff;
            grid-column: 1/-1
        }

        /* Search */
        .search-wrap {
            position: relative
        }

        .search-wrap input {
            width: 100%;
            padding: 9px 12px 9px 36px;
            border: 1.5px solid #d0e0d6;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            color: var(--text);
            transition: border-color .2s;
            outline: none;
        }

        .search-wrap input:focus {
            border-color: var(--green-main)
        }

        .search-wrap .icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            color: var(--text-muted)
        }

        /* Filter */
        #kec-filter {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid #d0e0d6;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            color: var(--text);
            outline: none;
            cursor: pointer;
            transition: border-color .2s;
        }

        #kec-filter:focus {
            border-color: var(--green-main)
        }

        .btn-reset {
            width: 100%;
            margin-top: 8px;
            padding: 8px;
            background: var(--green-light);
            color: var(--green-dark);
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
        }

        .btn-reset:hover {
            background: #b8dcc5
        }

        #result-info {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            text-align: center
        }

        /* Layer toggles */
        .layer-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background .15s;
            user-select: none;
        }

        .layer-item:hover {
            background: var(--green-light)
        }

        .layer-item input[type=checkbox] {
            accent-color: var(--green-main);
            width: 16px;
            height: 16px;
            cursor: pointer
        }

        .layer-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .layer-item span {
            font-size: 13px;
            font-weight: 500
        }

        /* ── MAP ── */
        #map {
            flex: 1;
            z-index: 1
        }

        /* ── LEGEND ── */
        .legend {
            background: rgba(255, 255, 255, .97);
            backdrop-filter: blur(8px);
            border-radius: var(--radius);
            padding: 14px 16px;
            box-shadow: var(--shadow);
            min-width: 170px;
        }

        .legend h4 {
            font-size: 11.5px;
            font-weight: 700;
            color: var(--green-dark);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: .6px
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 7px;
            font-size: 12px
        }

        .legend-dot {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            border: 2px solid rgba(0, 0, 0, .12);
            flex-shrink: 0
        }

        .legend-line {
            width: 22px;
            height: 2px;
            border-radius: 2px;
            flex-shrink: 0
        }

        /* Popup */
        .popup-content h3 {
            font-size: 13.5px;
            font-weight: 700;
            color: var(--green-dark);
            margin-bottom: 8px;
            border-bottom: 2px solid var(--green-light);
            padding-bottom: 6px;
            line-height: 1.3
        }

        .popup-content table {
            width: 100%;
            font-size: 12px;
            border-collapse: collapse
        }

        .popup-content td {
            padding: 4px 6px;
            vertical-align: top
        }

        .popup-content td:first-child {
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
            padding-right: 10px
        }

        .popup-badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        /* Scrollbar */
        aside::-webkit-scrollbar {
            width: 4px
        }

        aside::-webkit-scrollbar-thumb {
            background: #c4d9cb;
            border-radius: 4px
        }

        .leaflet-popup-content {
            min-width: 220px
        }

        @media(max-width:680px) {
            :root {
                --sidebar-w: 260px
            }

            header h1 {
                font-size: 13px
            }
        }

        @media(max-width:480px) {
            aside {
                display: none
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">🗺️</div>
        <h1>WebGIS Pendidikan Banyuwangi
            <span>Sebaran Fasilitas Pendidikan – Kab. Banyuwangi</span>
        </h1>
        <div class="badge">Leaflet.js · OSM</div>
    </header>

    <div class="app">
        <aside id="sidebar">

            <!-- Statistik -->
            <div class="sidebar-section">
                <div class="section-title">Statistik Fasilitas</div>
                <div class="stats-grid">
                    <div class="stat-card sd">
                        <div class="count" id="count-sd">0</div>
                        <div class="label">SD / MI</div>
                    </div>
                    <div class="stat-card smp">
                        <div class="count" id="count-smp">0</div>
                        <div class="label">SMP / MTs</div>
                    </div>
                    <div class="stat-card sma">
                        <div class="count" id="count-sma">0</div>
                        <div class="label">SMA / SMK</div>
                    </div>
                    <div class="stat-card tk">
                        <div class="count" id="count-tk">0</div>
                        <div class="label">TK / PAUD / RA</div>
                    </div>
                    <div class="stat-card lain">
                        <div class="count" id="count-lain">0</div>
                        <div class="label">Lainnya</div>
                    </div>
                    <div class="stat-card total">
                        <div class="count" id="count-total">0</div>
                        <div class="label">Total Fasilitas</div>
                    </div>
                </div>
            </div>

            <!-- Search -->
            <div class="sidebar-section">
                <div class="section-title">Cari Fasilitas</div>
                <div class="search-wrap">
                    <span class="icon">🔍</span>
                    <input type="text" id="search-input" placeholder="Nama sekolah…" />
                </div>
            </div>

            <!-- Filter Kecamatan (dari nama wilayah) -->
            <div class="sidebar-section">
                <div class="section-title">Filter Jenis</div>
                <select id="kec-filter">
                    <option value="">-- Semua Jenis --</option>
                    <option value="sd">SD / MI</option>
                    <option value="smp">SMP / MTs</option>
                    <option value="sma">SMA / SMK / MA</option>
                    <option value="tk">TK / PAUD / RA</option>
                    <option value="univ">Universitas</option>
                    <option value="lain">Lainnya</option>
                </select>
                <button class="btn-reset" id="btn-reset">↺ Reset Filter</button>
                <div id="result-info"></div>
            </div>

            <!-- Layer Toggles -->
            <div class="sidebar-section">
                <div class="section-title">Tampilan Layer</div>
                <label class="layer-item">
                    <input type="checkbox" id="toggle-wilayah" checked />
                    <div class="layer-dot"
                        style="background:transparent;border:2px solid #e74c3c;border-radius:2px;width:16px;height:10px">
                    </div>
                    <span>Batas Wilayah</span>
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="toggle-sd" checked />
                    <div class="layer-dot" style="background:#2980b9"></div><span>SD / MI</span>
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="toggle-smp" checked />
                    <div class="layer-dot" style="background:#27ae60"></div><span>SMP / MTs</span>
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="toggle-sma" checked />
                    <div class="layer-dot" style="background:#e74c3c"></div><span>SMA / SMK / MA</span>
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="toggle-tk" checked />
                    <div class="layer-dot" style="background:#f39c12"></div><span>TK / PAUD / RA</span>
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="toggle-univ" checked />
                    <div class="layer-dot" style="background:#8e44ad"></div><span>Universitas / Ponpes</span>
                </label>
                <label class="layer-item">
                    <input type="checkbox" id="toggle-lain" checked />
                    <div class="layer-dot" style="background:#7f8c8d"></div><span>Lainnya</span>
                </label>
            </div>

        </aside>

        <div id="map"></div>
    </div>

    <script>
        // ─────────────────────────────────────────────────────────
        // 1. INISIALISASI PETA
        // ─────────────────────────────────────────────────────────
        const map = L.map('map', { zoomControl: false }).setView([-8.2193, 114.3691], 11);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        L.control.zoom({ position: 'topright' }).addTo(map);
        L.control.scale({ imperial: false, position: 'bottomleft' }).addTo(map);

        // ─────────────────────────────────────────────────────────
        // 2. KLASIFIKASI BERDASARKAN NAMA
        // ─────────────────────────────────────────────────────────
        function classifyByName(name = '') {
            const n = name.toUpperCase();
            if (/\bSMK\b|\bSMA\b|\bSMEA\b|\bSTM\b|\bSMES\b|\bMA\b|\bMADRASAH ALIYAH\b/.test(n)) return 'sma';
            if (/\bSMPN?\b|\bSMP\b|\bMTS\b|\bMT[S]?\b/.test(n)) return 'smp';
            if (/\bSDN?\b|\bSD\b|\bMI\b|\bMIN?\b|\bSEKOLAH DASAR\b/.test(n)) return 'sd';
            if (/\bTK\b|\bPAUD\b|\bRA\b|\bRAUDHATUL\b|\bKINDER\b/.test(n)) return 'tk';
            if (/\bUNIV\b|\bUNIVERSITAS\b|\bINSTITUT\b|\bPOLITEKNIK\b|\bSTIKES\b|\bIAI\b|\bPOLTEKNIK\b/.test(n)) return 'univ';
            if (/\bPONPES\b|\bPESANTREN\b|\bPONDOK\b|\bTPQ\b/.test(n)) return 'univ';
            return 'lain';
        }

        // Warna & badge per grup
        const GRP_COLOR = {
            sd: '#2980b9', smp: '#27ae60',
            sma: '#e74c3c', tk: '#f39c12',
            univ: '#8e44ad', lain: '#7f8c8d',
        };
        const GRP_BG = {
            sd: '#e3f0ff', smp: '#e8f5e9',
            sma: '#fde8e8', tk: '#fff8e1',
            univ: '#f3e5f5', lain: '#f0f0f0',
        };
        const GRP_TC = {
            sd: '#1565c0', smp: '#2e7d32',
            sma: '#c62828', tk: '#f57f17',
            univ: '#6a1b9a', lain: '#555',
        };
        const GRP_LABEL = {
            sd: 'SD/MI', smp: 'SMP/MTs', sma: 'SMA/SMK/MA',
            tk: 'TK/PAUD', univ: 'Universitas/Ponpes', lain: 'Lainnya'
        };

        // ─────────────────────────────────────────────────────────
        // 3. BUAT ICON MARKER
        // ─────────────────────────────────────────────────────────
        function makeIcon(grp) {
            const c = GRP_COLOR[grp] || '#7f8c8d';
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
    <path d="M13 0C5.82 0 0 5.82 0 13c0 8.66 13 21 13 21S26 21.66 26 13C26 5.82 20.18 0 13 0z"
      fill="${c}" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
    <circle cx="13" cy="13" r="5.5" fill="white" opacity="0.88"/>
  </svg>`;
            return L.divIcon({ html: svg, iconSize: [26, 34], iconAnchor: [13, 34], popupAnchor: [0, -34], className: '' });
        }

        // ─────────────────────────────────────────────────────────
        // 4. CENTROID UNTUK POLYGON / MULTIPOLYGON
        // ─────────────────────────────────────────────────────────
        function getCentroid(geometry) {
            const t = geometry.type;
            if (t === 'Point') {
                return [geometry.coordinates[1], geometry.coordinates[0]];
            }
            let ring = [];
            if (t === 'Polygon') ring = geometry.coordinates[0];
            else if (t === 'MultiPolygon') ring = geometry.coordinates[0][0];
            else return null;

            let lat = 0, lng = 0;
            ring.forEach(c => { lng += c[0]; lat += c[1]; });
            return [lat / ring.length, lng / ring.length];
        }

        // ─────────────────────────────────────────────────────────
        // 5. LAYER GROUPS
        // ─────────────────────────────────────────────────────────
        const layers = {
            wilayah: L.layerGroup().addTo(map),
            sd: L.layerGroup().addTo(map),
            smp: L.layerGroup().addTo(map),
            sma: L.layerGroup().addTo(map),
            tk: L.layerGroup().addTo(map),
            univ: L.layerGroup().addTo(map),
            lain: L.layerGroup().addTo(map),
        };

        // ─────────────────────────────────────────────────────────
        // 6. STATE
        // ─────────────────────────────────────────────────────────
        let allMarkers = [];  // { marker, name, grp }
        let counts = { sd: 0, smp: 0, sma: 0, tk: 0, univ: 0, lain: 0 };

        // ─────────────────────────────────────────────────────────
        // 7. LOAD BATAS WILAYAH
        // ─────────────────────────────────────────────────────────
        const FOLDER = 'edu_banyuwangi_geojson_uid_531107cc-d64e-412d-bb4b-5dd5346918f0';

        fetch(`${FOLDER}/clipping_boundary.geojson`)
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
                L.geoJSON(data, {
                    style: {
                        color: '#e74c3c', weight: 2.5, fillOpacity: 0.04,
                        fillColor: '#e74c3c', dashArray: '6,4'
                    }
                }).addTo(layers.wilayah);
            })
            .catch(() => console.warn('clipping_boundary.geojson tidak ditemukan.'));

        // ─────────────────────────────────────────────────────────
        // 8. LOAD FASILITAS PENDIDIKAN
        // ─────────────────────────────────────────────────────────
        fetch(`${FOLDER}/edu_banyuwangi.geojson`)
            .then(r => r.ok ? r.json() : Promise.reject('GeoJSON tidak ditemukan'))
            .then(data => {
                data.features.forEach(f => {
                    const p = f.properties || {};
                    const name = p.name || p.NAME || '(Tanpa nama)';
                    const grp = classifyByName(name);
                    const amenity = p.amenity || '-';

                    const latlng = getCentroid(f.geometry);
                    if (!latlng) return;

                    counts[grp] = (counts[grp] || 0) + 1;

                    const marker = L.marker(latlng, { icon: makeIcon(grp) });

                    marker.bindPopup(`
        <div class="popup-content">
          <h3>${name}</h3>
          <span class="popup-badge"
            style="background:${GRP_BG[grp]};color:${GRP_TC[grp]}">
            ${GRP_LABEL[grp]}
          </span>
          <table>
            <tr><td>Tipe OSM</td><td>${amenity}</td></tr>
            <tr><td>Kapasitas</td><td>${p.capacity || '-'}</td></tr>
            <tr><td>OSM ID</td><td>${p.osm_id || '-'}</td></tr>
          </table>
        </div>
      `, { maxWidth: 280 });

                    marker.addTo(layers[grp] || layers.lain);
                    allMarkers.push({ marker, name, grp });
                });

                updateStats(allMarkers);
            })
            .catch(err => console.error('Gagal memuat GeoJSON:', err));

        // ─────────────────────────────────────────────────────────
        // 9. UPDATE STATISTIK
        // ─────────────────────────────────────────────────────────
        function updateStats(src) {
            const c = { sd: 0, smp: 0, sma: 0, tk: 0, univ: 0, lain: 0 };
            src.forEach(m => { if (m.grp in c) c[m.grp]++; });
            document.getElementById('count-sd').textContent = c.sd;
            document.getElementById('count-smp').textContent = c.smp;
            document.getElementById('count-sma').textContent = c.sma;
            document.getElementById('count-tk').textContent = c.tk;
            document.getElementById('count-lain').textContent = c.univ + c.lain;
            document.getElementById('count-total').textContent =
                c.sd + c.smp + c.sma + c.tk + c.univ + c.lain;
        }

        // ─────────────────────────────────────────────────────────
        // 10. FILTER
        // ─────────────────────────────────────────────────────────
        function applyFilter() {
            const grpFilter = document.getElementById('kec-filter').value.toLowerCase();
            const search = document.getElementById('search-input').value.toLowerCase().trim();

            const visible = [];
            allMarkers.forEach(({ marker, name, grp }) => {
                const matchGrp = !grpFilter || grp === grpFilter || (grpFilter === 'lain' && (grp === 'lain' || grp === 'univ'));
                const matchSearch = !search || name.toLowerCase().includes(search);
                const show = matchGrp && matchSearch;

                const tl = layers[grp] || layers.lain;
                if (show) {
                    if (!tl.hasLayer(marker)) tl.addLayer(marker);
                    visible.push({ marker, name, grp });
                } else {
                    if (tl.hasLayer(marker)) tl.removeLayer(marker);
                }
            });

            updateStats(visible);
            const info = document.getElementById('result-info');
            info.textContent = (grpFilter || search)
                ? `${visible.length} fasilitas ditampilkan`
                : '';
        }

        document.getElementById('kec-filter').addEventListener('change', applyFilter);
        document.getElementById('search-input').addEventListener('input', applyFilter);
        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('kec-filter').value = '';
            document.getElementById('search-input').value = '';
            applyFilter();
        });

        // ─────────────────────────────────────────────────────────
        // 11. LAYER TOGGLES
        // ─────────────────────────────────────────────────────────
        [['toggle-wilayah', 'wilayah'], ['toggle-sd', 'sd'], ['toggle-smp', 'smp'],
        ['toggle-sma', 'sma'], ['toggle-tk', 'tk'], ['toggle-univ', 'univ'],
        ['toggle-lain', 'lain']].forEach(([id, key]) => {
            document.getElementById(id).addEventListener('change', e => {
                if (e.target.checked) map.addLayer(layers[key]);
                else map.removeLayer(layers[key]);
            });
        });

        // ─────────────────────────────────────────────────────────
        // 12. LEGENDA
        // ─────────────────────────────────────────────────────────
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = () => {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
    <h4>🏫 Legenda</h4>
    <div class="legend-item"><div class="legend-dot" style="background:#2980b9"></div> SD / MI</div>
    <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div> SMP / MTs</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> SMA / SMK / MA</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div> TK / PAUD / RA</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8e44ad"></div> Universitas / Ponpes</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7f8c8d"></div> Lainnya</div>
    <hr style="margin:8px 0;border-color:#e0e0e0">
    <div class="legend-item">
      <div class="legend-line" style="width:22px;height:0;border-top:2.5px dashed #e74c3c"></div>
      Batas Wilayah
    </div>`;
            return div;
        };
        legend.addTo(map);
    </script>
</body>

</html>
